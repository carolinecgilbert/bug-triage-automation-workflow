services:
  postgres:
    image: postgres:16
    container_name: bug_triage_postgres
    environment:
      POSTGRES_DB: bugtriage
      POSTGRES_USER: bugtriage
      POSTGRES_PASSWORD: bugtriage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

